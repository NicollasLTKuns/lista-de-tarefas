<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <header>
        <h1 id="titulo">Minhas Tarefas</h1>
        <p id="frase">Organize o seu dia de forma simples e eficiente</p>
    </header>
    <main>
        <div id="resultados">
            <div class="tarefas">
                <p>ativas</p>
                <p id="contagemAtivas">0</p>
            </div>
            <div class="tarefas">
                <p>Concluidas</p>
                <p id="contagemConcluidas">0</p>
            </div>
        </div>
        <div id="addTarefas">
            <input type="text" placeholder="Adicionar Tarefas" id="textAdd">
            <input type="submit" value="+" id="add">
        </div>
        <div id="listaTarefas">
            <div id="semTarefas">
                <p>Sem tarefas para fazer no momento</p>
            </div>
            <div id="tarefas">

            </div>
        </div>
    </main>
</body>
</html>
